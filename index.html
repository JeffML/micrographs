<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Wall</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #111;
        font-family: system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Editor toolbar ───────────────────────────────────── */
      #toolbar {
        width: 100%;
        background: #222;
        color: #bbb;
        padding: 8px 12px;
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 13px;
      }
      #toolbar.visible {
        display: flex;
        flex-wrap: wrap;
      }
      #toolbar button {
        padding: 5px 12px;
        cursor: pointer;
        font-size: 13px;
      }

      /* ── Stage ────────────────────────────────────────────── */
      #stage {
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      /* Hint text — shown only in viewer mode */
      #hint {
        color: #888;
        font-size: 13px;
        letter-spacing: 0.03em;
      }
      body.editing #hint { display: none; }

      /* Touch hint shown by default; swap to hover hint on real mouse devices */
      #hint-hover { display: none; }
      #hint-touch { display: inline; }
      @media (hover: hover) and (pointer: fine) {
        #hint-hover { display: inline; }
        #hint-touch { display: none; }
      }

      #container {
        position: relative;
        display: inline-block;
        line-height: 0;
      }

      #photo {
        display: block;
        max-width: 90vw;
        max-height: 85vh;
        user-select: none;
      }

      /* Draft rectangle drawn while creating a new hotspot */
      #draft {
        position: absolute;
        border: 2px dashed #fc0;
        background: rgba(255, 204, 0, 0.12);
        pointer-events: none;
        display: none;
      }

      /* ── Hotspot ──────────────────────────────────────────── */
      .hotspot {
        position: absolute;
        border: 2px solid transparent;
        border-radius: 3px;
      }

      /* Tooltip */
      .hotspot .tip {
        display: none;
        position: absolute;
        bottom: calc(100% + 10px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(20, 20, 20, 0.93);
        color: #f0f0f0;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.4;
        letter-spacing: 0.01em;
        white-space: nowrap;
        pointer-events: none;
        z-index: 50;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .hotspot .tip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: rgba(0, 0, 0, 0.88);
      }
      /* Show tooltip on hover in viewer mode only */
      body:not(.editing) .hotspot:hover .tip {
        display: block;
      }

      /* Resize handle (bottom-right corner) */
      .hotspot .rz {
        display: none;
        position: absolute;
        bottom: -5px;
        right: -5px;
        width: 12px;
        height: 12px;
        background: #fc0;
        border: 1px solid #000;
        cursor: se-resize;
        z-index: 3;
      }

      /* Delete button (top-right corner) */
      .hotspot .del {
        display: none;
        position: absolute;
        top: -8px;
        right: -8px;
        width: 16px;
        height: 16px;
        background: #e33;
        color: #fff;
        border: none;
        border-radius: 50%;
        font-size: 11px;
        line-height: 16px;
        text-align: center;
        cursor: pointer;
        z-index: 3;
        padding: 0;
      }

      /* Editor mode overrides */
      body.editing #container {
        cursor: crosshair;
      }
      body.editing .hotspot {
        border-color: rgba(255, 204, 0, 0.85);
        background: rgba(255, 204, 0, 0.08);
        cursor: move;
      }
      body.editing .hotspot .rz {
        display: block;
      }
      body.editing .hotspot .del {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="btn-save">Save</button>
      <button id="btn-upload">Upload Photo</button>
      <input id="file-input" type="file" accept="image/*" style="display:none">
      <button id="btn-exit">Exit Editor</button>
      <span
        >Drag empty area to add &nbsp;·&nbsp; Drag hotspot to move &nbsp;·&nbsp;
        Corner handle to resize &nbsp;·&nbsp; Right-click hotspot to edit
        tooltip &nbsp;·&nbsp; × to delete</span
      >
    </div>

    <div id="stage">
      <div id="container">
        <img
          id="photo"
          src="/api/image"
          alt="Framed photographs"
          draggable="false"
        />
        <div id="draft"></div>
      </div>
      <p id="hint">
        <span id="hint-hover">Hover over any photograph for more info</span>
        <span id="hint-touch">Tap any photograph for more info</span>
      </p>
    </div>

    <script>
      let hotspots = [];
      let editing = false;
      let editorPassword = null;

      const container = document.getElementById("container");
      const draft = document.getElementById("draft");
      const btnSave   = document.getElementById("btn-save");
      const btnUpload  = document.getElementById("btn-upload");
      const fileInput  = document.getElementById("file-input");
      const btnExit    = document.getElementById("btn-exit");
      const toolbar    = document.getElementById("toolbar");
      const photo      = document.getElementById("photo");

      // ── Load ────────────────────────────────────────────────────
      fetch("/api/hotspots")
        .then((r) => r.json())
        .then((data) => {
          hotspots = data;
          render();
        })
        .catch(() => {
          hotspots = [];
        });

      // ── Editor toggle ───────────────────────────────────────────
      function setEditing(on) {
        editing = on;
        document.body.classList.toggle("editing", on);
        toolbar.classList.toggle("visible", on);
      }

      function tryEnterEditor() {
        const pw = prompt("Editor password:");
        if (!pw) return;
        editorPassword = pw;
        setEditing(true);
      }

      btnExit.addEventListener("click", () => setEditing(false));

      // ── Upload photo ──────────────────────────────────────────
      btnUpload.addEventListener("click", () => fileInput.click());

      fileInput.addEventListener("change", async () => {
        const file = fileInput.files[0];
        if (!file) return;
        btnUpload.textContent = "Uploading…";
        btnUpload.disabled = true;
        try {
          const res = await fetch("/api/image", {
            method: "POST",
            headers: {
              "Content-Type": file.type || "image/jpeg",
              "x-editor-password": editorPassword,
            },
            body: file,
          });
          if (res.ok) {
            // Reload image without refreshing the page
            photo.src = "/api/image?t=" + Date.now();
            btnUpload.textContent = "Uploaded!";
            setTimeout(() => { btnUpload.textContent = "Upload Photo"; btnUpload.disabled = false; }, 2000);
          } else if (res.status === 401) {
            alert("Incorrect password.");
            editorPassword = null;
            setEditing(false);
            btnUpload.textContent = "Upload Photo";
            btnUpload.disabled = false;
          } else {
            alert("Upload failed. Please try again.");
            btnUpload.textContent = "Upload Photo";
            btnUpload.disabled = false;
          }
        } catch {
          alert("Network error. Please try again.");
          btnUpload.textContent = "Upload Photo";
          btnUpload.disabled = false;
        }
        fileInput.value = "";
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && editing) setEditing(false);
        if ((e.key === "e" || e.key === "E") && e.shiftKey && e.altKey && !editing)
          tryEnterEditor();
      });

      // ── 5-tap trigger (mobile) ───────────────────────────────────
      let tapCount = 0,
        tapTimer = null;
      document.addEventListener("touchend", () => {
        if (editing) return;
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => {
          tapCount = 0;
        }, 1000);
        if (tapCount >= 5) {
          tapCount = 0;
          clearTimeout(tapTimer);
          tryEnterEditor();
        }
      });

      // ── Render ──────────────────────────────────────────────────
      function render() {
        document.querySelectorAll(".hotspot").forEach((el) => el.remove());
        hotspots.forEach((hs, i) => makeHotspot(hs, i));
      }

      function applyPos(el, hs) {
        el.style.left = hs.x + "%";
        el.style.top = hs.y + "%";
        el.style.width = hs.w + "%";
        el.style.height = hs.h + "%";
      }

      function makeHotspot(hs, i) {
        const el = document.createElement("div");
        el.className = "hotspot";

        const tip = document.createElement("div");
        tip.className = "tip";
        tip.textContent = hs.tooltip;
        el.appendChild(tip);

        const rz = document.createElement("div");
        rz.className = "rz";
        el.appendChild(rz);

        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "×";
        del.title = "Delete hotspot";
        el.appendChild(del);

        applyPos(el, hs);
        container.insertBefore(el, draft);

        // ── Move (mouse + touch) ──
        function beginMove(startX, startY) {
          const cRect = container.getBoundingClientRect();
          const ox = startX, oy = startY;
          const ox_pct = hs.x, oy_pct = hs.y;
          let moved = false;
          function doMove(cx, cy) {
            moved = true;
            hs.x = clamp(ox_pct + ((cx - ox) / cRect.width) * 100, 0, 100 - hs.w);
            hs.y = clamp(oy_pct + ((cy - oy) / cRect.height) * 100, 0, 100 - hs.h);
            applyPos(el, hs);
          }
          function doEnd() {
            if (!moved) {
              const val = prompt("Edit tooltip text:", hs.tooltip);
              if (val !== null) { hs.tooltip = val; tip.textContent = val; }
            }
          }
          return { doMove, doEnd };
        }

        el.addEventListener("mousedown", (e) => {
          if (!editing || e.target === rz || e.target === del) return;
          e.stopPropagation();
          const { doMove, doEnd } = beginMove(e.clientX, e.clientY);
          function mm(e) { doMove(e.clientX, e.clientY); }
          function mu() {
            document.removeEventListener("mousemove", mm);
            document.removeEventListener("mouseup", mu);
            doEnd();
          }
          document.addEventListener("mousemove", mm);
          document.addEventListener("mouseup", mu);
        });

        el.addEventListener("touchstart", (e) => {
          if (!editing || e.target === rz || e.target === del) return;
          e.stopPropagation();
          e.preventDefault();
          const t = e.touches[0];
          const { doMove, doEnd } = beginMove(t.clientX, t.clientY);
          function tm(e) { const t = e.touches[0]; doMove(t.clientX, t.clientY); }
          function tu() {
            document.removeEventListener("touchmove", tm);
            document.removeEventListener("touchend", tu);
            doEnd();
          }
          document.addEventListener("touchmove", tm, { passive: false });
          document.addEventListener("touchend", tu);
        }, { passive: false });

        // Right-click → edit tooltip (alternative to click)
        el.addEventListener("contextmenu", (e) => {
          if (!editing) return;
          e.preventDefault();
          const val = prompt("Edit tooltip text:", hs.tooltip);
          if (val !== null) {
            hs.tooltip = val;
            tip.textContent = val;
          }
        });

        // ── Resize (mouse + touch) ──
        function beginResize(startX, startY) {
          const cRect = container.getBoundingClientRect();
          const ox = startX, oy = startY, ow = hs.w, oh = hs.h;
          function doMove(cx, cy) {
            hs.w = Math.max(2, ow + ((cx - ox) / cRect.width) * 100);
            hs.h = Math.max(2, oh + ((cy - oy) / cRect.height) * 100);
            applyPos(el, hs);
          }
          return { doMove };
        }

        rz.addEventListener("mousedown", (e) => {
          if (!editing) return;
          e.stopPropagation();
          const { doMove } = beginResize(e.clientX, e.clientY);
          function mm(e) { doMove(e.clientX, e.clientY); }
          function mu() {
            document.removeEventListener("mousemove", mm);
            document.removeEventListener("mouseup", mu);
          }
          document.addEventListener("mousemove", mm);
          document.addEventListener("mouseup", mu);
        });

        rz.addEventListener("touchstart", (e) => {
          if (!editing) return;
          e.stopPropagation();
          e.preventDefault();
          const t = e.touches[0];
          const { doMove } = beginResize(t.clientX, t.clientY);
          function tm(e) { const t = e.touches[0]; doMove(t.clientX, t.clientY); }
          function tu() {
            document.removeEventListener("touchmove", tm);
            document.removeEventListener("touchend", tu);
          }
          document.addEventListener("touchmove", tm, { passive: false });
          document.addEventListener("touchend", tu);
        }, { passive: false });

        // ── Delete ──
        del.addEventListener("click", (e) => {
          e.stopPropagation();
          hotspots.splice(i, 1);
          render();
        });
      }

      // ── Draw new hotspot (mouse + touch) ──────────────────────
      let drawing = false, drawStart = {};

      function beginDraw(clientX, clientY) {
        const cRect = container.getBoundingClientRect();
        drawStart = {
          x: ((clientX - cRect.left) / cRect.width) * 100,
          y: ((clientY - cRect.top) / cRect.height) * 100,
        };
        drawing = true;
        draft.style.display = "block";
        draft.style.left = drawStart.x + "%";
        draft.style.top = drawStart.y + "%";
        draft.style.width = "0";
        draft.style.height = "0";
      }

      function moveDraw(clientX, clientY) {
        if (!drawing) return;
        const cRect = container.getBoundingClientRect();
        const cx = ((clientX - cRect.left) / cRect.width) * 100;
        const cy = ((clientY - cRect.top) / cRect.height) * 100;
        const rect = getDraftRect(cx, cy);
        draft.style.left = rect.x + "%";
        draft.style.top = rect.y + "%";
        draft.style.width = rect.w + "%";
        draft.style.height = rect.h + "%";
      }

      function endDraw(clientX, clientY) {
        if (!drawing) return;
        drawing = false;
        draft.style.display = "none";
        const cRect = container.getBoundingClientRect();
        const cx = ((clientX - cRect.left) / cRect.width) * 100;
        const cy = ((clientY - cRect.top) / cRect.height) * 100;
        const rect = getDraftRect(cx, cy);
        if (rect.w < 1 || rect.h < 1) return;
        const tooltip = prompt("Tooltip text for this photo:");
        if (!tooltip || !tooltip.trim()) return;
        hotspots.push({
          x: round(rect.x), y: round(rect.y),
          w: round(rect.w), h: round(rect.h),
          tooltip: tooltip.trim(),
        });
        render();
      }

      container.addEventListener("mousedown", (e) => {
        if (!editing || e.target.closest(".hotspot")) return;
        e.preventDefault();
        beginDraw(e.clientX, e.clientY);
      });
      document.addEventListener("mousemove", (e) => { moveDraw(e.clientX, e.clientY); });
      document.addEventListener("mouseup",   (e) => { endDraw(e.clientX, e.clientY); });

      container.addEventListener("touchstart", (e) => {
        if (!editing || e.target.closest(".hotspot")) return;
        e.preventDefault();
        const t = e.touches[0];
        beginDraw(t.clientX, t.clientY);
      }, { passive: false });
      document.addEventListener("touchmove", (e) => {
        if (!drawing) return;
        e.preventDefault();
        const t = e.touches[0];
        moveDraw(t.clientX, t.clientY);
      }, { passive: false });
      document.addEventListener("touchend", (e) => {
        if (!drawing) return;
        const t = e.changedTouches[0];
        endDraw(t.clientX, t.clientY);
      });

      function getDraftRect(cx, cy) {
        return {
          x: Math.min(drawStart.x, cx),
          y: Math.min(drawStart.y, cy),
          w: Math.abs(cx - drawStart.x),
          h: Math.abs(cy - drawStart.y),
        };
      }

      // ── Save ─────────────────────────────────────────────────────
      btnSave.addEventListener("click", async () => {
        const clean = hotspots.map((hs) => ({
          x: round(hs.x),
          y: round(hs.y),
          w: round(hs.w),
          h: round(hs.h),
          tooltip: hs.tooltip,
        }));
        btnSave.textContent = "Saving…";
        btnSave.disabled = true;
        try {
          const res = await fetch("/api/hotspots", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: editorPassword, hotspots: clean }),
          });
          if (res.ok) {
            btnSave.textContent = "Saved!";
            setTimeout(() => {
              btnSave.textContent = "Save";
              btnSave.disabled = false;
            }, 2000);
          } else if (res.status === 401) {
            alert("Incorrect password — edits not saved.");
            editorPassword = null;
            setEditing(false);
            btnSave.textContent = "Save";
            btnSave.disabled = false;
          } else {
            alert("Save failed. Please try again.");
            btnSave.textContent = "Save";
            btnSave.disabled = false;
          }
        } catch {
          alert("Network error. Please try again.");
          btnSave.textContent = "Save";
          btnSave.disabled = false;
        }
      });

      // ── Helpers ─────────────────────────────────────────────────
      function clamp(v, lo, hi) {
        return Math.min(Math.max(v, lo), hi);
      }
      function round(v) {
        return Math.round(v * 1000) / 1000;
      }
    </script>
  </body>
</html>
